name: restock pawndle

on:
  workflow_dispatch:      # run it manually from the Actions tab
  schedule:
    - cron: "0 5 * * 1"   # every Monday 05:00 UTC

permissions:
  contents: write

jobs:
  restock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: fetch pokemon cards
        env:
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
        run: python3 scripts/fetch_tcg.py --count 60
        continue-on-error: true

      - name: fetch cars
        run: python3 scripts/fetch_cars.py --count 40
        continue-on-error: true

      - name: merge into items.json
        run: python3 scripts/merge.py

      - name: commit
        run: |
          git config user.name "pawndle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add items.json images/
          git diff --cached --quiet && echo "nothing new" && exit 0
          git commit -m "restock: $(date -u +%Y-%m-%d)"
          git push
